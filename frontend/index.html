<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <title>SOS Oyunu</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>SOS Oyunu</h1>

    <div id="lobby">
      <div class="lobby-section">
        <h3>Oda Kur</h3>
        <label
          >Grid boyutu: <span id="gridValueLabel">4</span>x<span
            id="gridValueLabel2"
            >4</span
          ></label
        >
        <input type="range" id="gridSize" min="3" max="7" step="1" value="4" />

        <label>Kendime Güveniyorum: <span id="confidenceLabel">0</span></label>
        <input
          type="range"
          id="confidenceSlider"
          min="0"
          max="3"
          step="1"
          value="0"
        />

        <button id="createBtn">Oda Kur</button>
      </div>

      <div class="lobby-section">
        <h3>Odaya Katıl</h3>
        <input
          type="text"
          id="joinCodeInput"
          placeholder="Oda kodu girin"
          maxlength="4"
        />
        <button id="joinBtn">Katıl</button>
      </div>

      <p id="roomInfo"></p>
      <p id="errorMsg" style="color: red"></p>
    </div>

    <div id="gameInfo" style="display: none">
      <p id="turnIndicator"></p>
      <div id="scoreBoard"></div>
      <button id="changeBtn">Değiştir <span id="changeBadge">1</span></button>
      <button id="rematchBtn" style="display: none">Tekrar Oyna</button>
      <button id="mainMenuBtn" style="display: none">Ana Menüye Dön</button>
    </div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
